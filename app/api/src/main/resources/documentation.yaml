openapi: "3.0.3"
info:
  title: "Mint Mind Documentation"
  version: "1.0.0"
tags:
  - name: "Auth"
  - name: "Storage"
  - name: "Webhooks"
  - name: "Coins"
  - name: "Sets"
  - name: "News"
  - name: "Marketplace"
paths:
  /auth/register:
    post:
      tags: [ "Auth" ]
      summary: "Register a new user"
      description: "Creates a user, profile, free active subscription, and stores an email verification token. Secret auth fields are never returned."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/anonymous:
    post:
      tags: [ "Auth" ]
      summary: "Authenticate or create an anonymous user session"
      description: "Bootstraps an anonymous account using an installation ID. If the installation already exists, returns a new token pair for the same user."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnonymousAuthRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/upgrade-account:
    post:
      tags: [ "Auth" ]
      summary: "Upgrade an anonymous account"
      description: "Requires an anonymous JWT and upgrades that same user to email/password without migrating data."
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: [ "Auth" ]
      summary: "Authenticate a user and issue tokens"
      description: "Requires a verified email address. Returns a short-lived JWT access token and a long-lived refresh token."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSessionApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: [ "Auth" ]
      summary: "Refresh an access token"
      description: "Validates the refresh token against the stored refresh token hash and rotates it."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSessionApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    get:
      tags: [ "Auth" ]
      summary: "Verify an email address"
      parameters:
        - name: "token"
          in: "query"
          required: true
          schema:
            type: string
          description: "Email verification token sent during registration."
      responses:
        "200":
          description: "Verified — returns an HTML success page"
          content:
            text/html:
              schema:
                type: string
        "400":
          description: "Invalid or already-used token — returns an HTML error page"
          content:
            text/html:
              schema:
                type: string

  /auth/resend-verification:
    post:
      tags: [ "Auth" ]
      summary: "Resend email verification link"
      description: "Always returns a generic success message to avoid account enumeration."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: "Too many requests — cooldown period has not elapsed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password-reset/request:
    post:
      tags: [ "Auth" ]
      summary: "Request a password reset"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPasswordResetRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetRequestApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password-reset/confirm:
    post:
      tags: [ "Auth" ]
      summary: "Confirm password reset with token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPasswordResetRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [ "Auth" ]
      summary: "Get the authenticated user's profile"
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [ "Auth" ]
      summary: "Update the authenticated user's profile"
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [ "Auth" ]
      summary: "Delete the authenticated user's account"
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/upload-urls:
    post:
      tags: [ "Storage" ]
      summary: "Create presigned S3 upload URLs"
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadUrlsRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlsApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/download-urls:
    post:
      tags: [ "Storage" ]
      summary: "Create presigned S3 download URLs"
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDownloadUrlsRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadUrlsApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Forbidden"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins:
    post:
      tags: [ "Coins" ]
      summary: "Save a recognized coin"
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCoinRequest"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags: [ "Coins" ]
      summary: "List coins in the authenticated user's collection"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "setId"
          in: "query"
          required: false
          schema:
            type: string
            format: uuid
        - name: "country"
          in: "query"
          required: false
          schema:
            type: string
        - name: "year"
          in: "query"
          required: false
          schema:
            type: integer
            format: int32
        - name: "minValue"
          in: "query"
          required: false
          schema:
            type: number
            format: double
        - name: "maxValue"
          in: "query"
          required: false
          schema:
            type: number
            format: double
        - name: "limit"
          in: "query"
          required: false
          schema:
            type: integer
            format: int32
            default: 20
        - name: "cursor"
          in: "query"
          required: false
          schema:
            type: integer
            format: int64
          description: "Cursor for pagination (the `createdAt` timestamp of the last item from the previous page in epoch milliseconds)."
        - name: "sortBy"
          in: "query"
          required: false
          schema:
            type: string
            enum:
              - VALUE_HIGH_TO_LOW
              - VALUE_LOW_TO_HIGH
              - RELEASE_YEAR_OLD_TO_NEW
              - RELEASE_YEAR_NEW_TO_OLD
              - DATE_ADDED_OLD_TO_NEW
              - DATE_ADDED_NEW_TO_OLD
            default: DATE_ADDED_NEW_TO_OLD
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinListApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/{id}:
    get:
      tags: [ "Coins" ]
      summary: "Get a coin by id"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [ "Coins" ]
      summary: "Delete a coin"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/{id}/notes:
    patch:
      tags: [ "Coins" ]
      summary: "Update notes for a coin"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCoinNotesRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/{id}/images:
    get:
      tags: [ "Coins" ]
      summary: "Create presigned download URLs for a coin's images"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinImagesApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/{id}/enrich:
    post:
      tags: [ "Coins" ]
      summary: "Manually trigger catalog enrichment for a coin"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinEnrichmentApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: "Provider unavailable or no viable match"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/{id}/pricing:
    get:
      tags: [ "Coins" ]
      summary: "Get recent eBay sold listings and price estimate for a coin"
      description: |
        Queries eBay's Finding API for recently sold listings that match this coin.
        Uses a two-pass strategy: first with grade (narrow), then without grade (broad)
        if fewer than 3 results are returned. The coin must belong to the authenticated user.
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinPricingApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Coin not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: "eBay API unavailable"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sets:
    post:
      tags: [ "Sets" ]
      summary: "Create a coin set"
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCoinSetRequest"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSetApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags: [ "Sets" ]
      summary: "List all sets for the authenticated user"
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSetListApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sets/{id}:
    get:
      tags: [ "Sets" ]
      summary: "Get a set by id"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSetApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [ "Sets" ]
      summary: "Update a set's name and description"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCoinSetRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSetApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [ "Sets" ]
      summary: "Delete a set"
      description: "Deletes the set. Coins that belonged to this set are not deleted — their set membership is cleared."
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sets/{id}/coins:
    post:
      tags: [ "Sets" ]
      summary: "Add coins to a set"
      description: "Adds the specified coins to the set. If a coin already belongs to another set, it is moved to this set automatically."
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifySetCoinsRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSetApiResponse"
        "400":
          description: "Bad request — one or more coin IDs are invalid or do not belong to the user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Set not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [ "Sets" ]
      summary: "Remove coins from a set"
      description: "Removes the specified coins from the set. The coins themselves are not deleted."
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifySetCoinsRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSetApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Set not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /news:
    get:
      tags: [ "News" ]
      summary: "List latest news articles"
      parameters:
        - name: "limit"
          in: "query"
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
        - name: "cursor"
          in: "query"
          required: false
          schema:
            type: integer
            format: int64
          description: "Cursor for pagination (the `publishedAt` timestamp of the last article from the previous page in epoch milliseconds)."
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListApiResponse"

  /news/{id}:
    get:
      tags: [ "News" ]
      summary: "Get a single news article by id"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsArticleApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /marketplace/listings:
    get:
      tags: [ "Marketplace" ]
      summary: "List live eBay coin listings"
      description: "Paginated feed of live eBay coin listings, refreshed every 10 minutes."
      parameters:
        - name: "limit"
          in: "query"
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
          description: "Page size"
        - name: "cursor"
          in: "query"
          required: false
          schema:
            type: integer
            format: int64
          description: "Cursor for pagination (the `timestamp` of the last item from the previous page)"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListingsApiResponse"
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/revenuecat:
    post:
      tags: [ "Webhooks" ]
      summary: "Handle RevenueCat subscription webhooks"
      description: "Updates mirrored subscription state from RevenueCat events. Requires Authorization: Bearer <REVENUECAT_WEBHOOK_SECRET>."
      security:
        - revenueCatWebhookAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevenueCatWebhookRequest"
      responses:
        "200":
          description: "Processed or ignored"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    revenueCatWebhookAuth:
      type: http
      scheme: bearer
      description: "RevenueCat webhook secret configured with REVENUECAT_WEBHOOK_SECRET."

  schemas:
    ApiResponseBase:
      type: object
      required: [ success, timestampMillis ]
      properties:
        success:
          type: boolean
        error:
          type: string
          nullable: true
        timestampMillis:
          type: integer
          format: int64

    MessageData:
      type: object
      required: [ message ]
      properties:
        message:
          type: string

    RegisterRequest:
      type: object
      required: [ email, password, firstName, lastName ]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          minLength: 8
          description: |
            Must be at least 8 characters and contain at least one uppercase letter,
            one lowercase letter, one digit, and one special character.
        firstName:
          type: string
          maxLength: 50
          example: "Ada"
        lastName:
          type: string
          maxLength: 50
          example: "Lovelace"

    AnonymousAuthRequest:
      type: object
      required: [ installationId ]
      properties:
        installationId:
          type: string
          description: "Client-generated stable installation identifier."

    SignupRequest:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginRequest:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
        installationId:
          type: string
          nullable: true
          description: "If provided and an anonymous session exists for this installation, its coins are migrated to the authenticated account."

    RefreshTokenRequest:
      type: object
      required: [ refreshToken ]
      properties:
        refreshToken:
          type: string

    RequestPasswordResetRequest:
      type: object
      required: [ email ]
      properties:
        email:
          type: string
          format: email

    ResendVerificationRequest:
      type: object
      required: [ email ]
      properties:
        email:
          type: string
          format: email

    ConfirmPasswordResetRequest:
      type: object
      required: [ token, newPassword ]
      properties:
        token:
          type: string
        newPassword:
          type: string
          format: password
          minLength: 8
          description: |
            Must be at least 8 characters and contain at least one uppercase letter,
            one lowercase letter, one digit, and one special character.

    UpdateProfileRequest:
      type: object
      required: [ firstName, lastName ]
      properties:
        firstName:
          type: string
          maxLength: 50
          example: "Ada"
        lastName:
          type: string
          maxLength: 50
          example: "Lovelace"

    LoginSessionResponse:
      type: object
      required: [ accessToken, refreshToken, accessTokenExpiresInSeconds, refreshTokenExpiresInSeconds ]
      properties:
        accessToken:
          type: string
          description: "JWT access token. Default TTL is 900 seconds."
        refreshToken:
          type: string
          description: "Long-lived refresh token. Store securely on the client."
        accessTokenExpiresInSeconds:
          type: integer
          format: int64
          example: 900
        refreshTokenExpiresInSeconds:
          type: integer
          format: int64
          example: 2592000

    AuthSessionResponse:
      type: object
      required: [ accessToken, refreshToken, accessTokenExpiresInSeconds, refreshTokenExpiresInSeconds, user ]
      properties:
        accessToken:
          type: string
          description: "JWT access token. Default TTL is 900 seconds."
        refreshToken:
          type: string
          description: "Long-lived refresh token. Store securely on the client."
        accessTokenExpiresInSeconds:
          type: integer
          format: int64
          example: 900
        refreshTokenExpiresInSeconds:
          type: integer
          format: int64
          example: 2592000
        user:
          $ref: "#/components/schemas/UserResponse"

    UserResponse:
      type: object
      required: [ id, firstName, lastName, emailVerified, isAnonymous ]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          nullable: true
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        emailVerified:
          type: boolean
        isAnonymous:
          type: boolean
        upgradedAt:
          type: string
          format: date-time
          nullable: true

    PasswordResetRequestResponse:
      type: object
      required: [ message ]
      properties:
        message:
          type: string

    RevenueCatWebhookRequest:
      type: object
      required: [ event ]
      properties:
        event:
          $ref: "#/components/schemas/RevenueCatWebhookEvent"

    RevenueCatWebhookEvent:
      type: object
      required: [ type ]
      properties:
        type:
          type: string
          enum: [ INITIAL_PURCHASE, RENEWAL, CANCELLATION, EXPIRATION, UNCANCELLATION ]
        app_user_id:
          type: string
          description: "RevenueCat customer ID. This should match subscriptions.rc_customer_id."
        original_app_user_id:
          type: string
          description: "Fallback RevenueCat customer ID when app_user_id is absent."
        expiration_at_ms:
          type: integer
          format: int64
          nullable: true
          description: "Subscription expiration timestamp in epoch milliseconds."
        product_id:
          type: string
          nullable: true
          description: "Used to infer plan when it contains free, pro, or enterprise."
        entitlement_id:
          type: string
          nullable: true
          description: "Used to infer plan when it contains free, pro, or enterprise."

    CreateUploadUrlsRequest:
      type: object
      required: [ fileCount ]
      properties:
        fileCount:
          type: integer
          format: int32
          minimum: 1
          maximum: 20

    PresignedUploadUrl:
      type: object
      required: [ objectKey, uploadUrl ]
      properties:
        objectKey:
          type: string
        uploadUrl:
          type: string
          format: uri

    CreateUploadUrlsResponse:
      type: object
      required: [ sessionId, uploads ]
      properties:
        sessionId:
          type: string
        uploads:
          type: array
          items:
            $ref: "#/components/schemas/PresignedUploadUrl"

    CreateDownloadUrlsRequest:
      type: object
      required: [ objectKeys ]
      properties:
        objectKeys:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: string

    PresignedDownloadUrl:
      type: object
      required: [ objectKey, downloadUrl ]
      properties:
        objectKey:
          type: string
        downloadUrl:
          type: string
          format: uri

    CreateDownloadUrlsResponse:
      type: object
      required: [ downloads ]
      properties:
        downloads:
          type: array
          items:
            $ref: "#/components/schemas/PresignedDownloadUrl"

    Confidence:
      type: string
      enum: [ HIGH, MEDIUM, LOW ]

    CatalogueNumberDto:
      type: object
      required: [ catalogueName, confidence ]
      properties:
        catalogueName:
          type: string
        number:
          type: string
          nullable: true
        confidence:
          $ref: "#/components/schemas/Confidence"

    RecognitionResultDto:
      type: object
      required: [ overallConfidence, rawJson ]
      properties:
        overallConfidence:
          $ref: "#/components/schemas/Confidence"
        countryOrIssuer:
          type: string
          nullable: true
        denomination:
          type: string
          nullable: true
        seriesName:
          type: string
          nullable: true
        year:
          type: integer
          format: int32
          nullable: true
        mintMark:
          type: string
          nullable: true
        metalComposition:
          type: string
          nullable: true
        estimatedGrade:
          type: string
          nullable: true
        estimatedGradeValue:
          type: string
          nullable: true
        rarityQualitative:
          type: string
          nullable: true
        valueLow:
          type: number
          format: double
          nullable: true
        valueHigh:
          type: number
          format: double
          nullable: true
        mintage:
          type: integer
          format: int64
          nullable: true
          description: "Total number of coins minted. Used to determine rarity."
        obverseDescription:
          type: string
          nullable: true
        reverseDescription:
          type: string
          nullable: true
        historicalContext:
          type: string
          nullable: true
        rawJson:
          type: string

    SaveCoinRequest:
      type: object
      required: [ obverseKey, reverseKey, recognitionResult ]
      properties:
        obverseKey:
          type: string
        reverseKey:
          type: string
        recognitionResult:
          $ref: "#/components/schemas/RecognitionResultDto"
        catalogueNumbers:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueNumberDto"
        notes:
          type: string
          nullable: true

    UpdateCoinNotesRequest:
      type: object
      properties:
        notes:
          type: string
          nullable: true

    CoinSummaryResponse:
      type: object
      required: [ id, obverseKey, reverseKey, createdAt ]
      properties:
        id:
          type: string
          format: uuid
        obverseKey:
          type: string
        reverseKey:
          type: string
        denomination:
          type: string
          nullable: true
        countryOrIssuer:
          type: string
          nullable: true
        year:
          type: integer
          format: int32
          nullable: true
        estimatedGrade:
          type: string
          nullable: true
        estimatedValueMean:
          type: number
          format: double
          nullable: true
          description: "Mean of valueLow and valueHigh. Null if either bound is absent."
        setId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time

    CoinListResponse:
      type: object
      required: [ coins, nextCursor ]
      properties:
        coins:
          type: array
          items:
            $ref: "#/components/schemas/CoinSummaryResponse"
        nextCursor:
          type: integer
          format: int64
          nullable: true
          description: "Cursor for the next page (epoch milliseconds of the last coin's createdAt). Null when there are no more pages."

    CoinDetailResponse:
      type: object
      required: [ id, obverseKey, reverseKey, recognitionResult, catalogueNumbers, createdAt ]
      properties:
        id:
          type: string
          format: uuid
        obverseKey:
          type: string
        reverseKey:
          type: string
        recognitionResult:
          $ref: "#/components/schemas/RecognitionResultDto"
        catalogueNumbers:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueNumberDto"
        setId:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    CollectionHighlightsResponse:
      type: object
      required: [ mostValuable, mostAncient, rarest ]
      properties:
        mostValuable:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/CoinSummaryResponse"
        mostAncient:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/CoinSummaryResponse"
        rarest:
          nullable: true
          description: "Coin with the lowest mintage. Null if no coin has a mintage value."
          allOf:
            - $ref: "#/components/schemas/CoinSummaryResponse"

    CreateCoinSetRequest:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true

    UpdateCoinSetRequest:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true

    ModifySetCoinsRequest:
      type: object
      required: [ coinIds ]
      properties:
        coinIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid

    CoinSetResponse:
      type: object
      required: [ id, name, previewObverseKeys, createdAt ]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        previewObverseKeys:
          type: array
          description: "S3 object keys for the obverse images of the first 5 coins in this set."
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    CoinImagesResponse:
      type: object
      required: [ obverseUrl, reverseUrl ]
      properties:
        obverseUrl:
          type: string
          format: uri
        reverseUrl:
          type: string
          format: uri

    CoinEnrichmentResponse:
      type: object
      required: [ message, catalogCoinId ]
      properties:
        message:
          type: string
        catalogCoinId:
          type: string
          format: uuid
        enrichedAt:
          type: string
          format: date-time
          nullable: true
        lastEnrichmentFailedAt:
          type: string
          format: date-time
          nullable: true
        lastEnrichmentError:
          type: string
          nullable: true

    NewsArticleResponse:
      type: object
      required: [ id, title, link, description, content, publishedAt ]
      properties:
        id:
          type: string
          format: uuid
          example: "2b8950ae-0376-49c8-9231-71824a6176f6"
        title:
          type: string
          example: "CAC Coins Bring Strong Premiums in April 2026 Auctions"
        link:
          type: string
          format: uri
          description: "Canonical URL of the original article."
          example: "https://coinweek.com/cac-coins-bring-strong-premiums-in-april-2026-auctions/"
        description:
          type: string
          description: "Plain-text summary of the article, safe for list views and previews."
          example: "CAC-approved and CACG-encapsulated coins performed well in April 2026 public sales."
        content:
          type: string
          description: "Sanitized HTML body of the full article. Scripts, iframes, and inline styles have been removed."
        author:
          type: string
          nullable: true
          example: "CoinWeek"
        imageUrl:
          type: string
          format: uri
          nullable: true
          description: "URL of the first image found in the article content. Use as a thumbnail in list views."
          example: "https://coinweek.com/wp-content/uploads/2026/05/1933-Eagle-cac-1200.webp"
        publishedAt:
          type: string
          format: date-time
          description: "ISO-8601 UTC timestamp from the RSS feed's <pubDate>."
          example: "2026-05-15T15:52:12Z"

    NewsArticleSummaryResponse:
      type: object
      required: [ id, title, link, description, publishedAt ]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        link:
          type: string
          format: uri
          description: "URL to the original article source."
        description:
          type: string
        imageUrl:
          type: string
          format: uri
          nullable: true
        publishedAt:
          type: string
          format: date-time

    NewsListResponse:
      type: object
      required: [ articles, nextCursor ]
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticleSummaryResponse"
        nextCursor:
          type: integer
          format: int64
          nullable: true
          description: "Cursor for the next page (epoch milliseconds of the last article's publishedAt). Null when there are no more pages."

    MarketplaceListingResponse:
      type: object
      required: [ id, title, price, currency, itemWebUrl, timestamp ]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          description: "Listing title from eBay"
        imageUrl:
          type: string
          format: uri
          nullable: true
          description: "First image from the listing, if available"
        price:
          type: string
          description: "Price as returned by eBay (display only)"
        currency:
          type: string
          example: "USD"
        itemWebUrl:
          type: string
          format: uri
          description: "Direct link to the listing on eBay"
        condition:
          type: string
          nullable: true
          example: "New"
        buyingOptions:
          type: array
          items:
            type: string
          example: [ "BUY_IT_NOW", "AUCTION" ]
        expiresAt:
          type: integer
          format: int64
          nullable: true
          description: "Auction end time (epoch milliseconds). Null for fixed-price listings."
        timestamp:
          type: integer
          format: int64
          description: "When this listing was last seen by our crawler (epoch milliseconds). Use as cursor for pagination."

    MarketplaceListingsResponse:
      type: object
      required: [ listings, nextCursor ]
      properties:
        listings:
          type: array
          items:
            $ref: "#/components/schemas/MarketplaceListingResponse"
        nextCursor:
          type: integer
          format: int64
          nullable: true
          description: "Cursor for the next page. Pass this as the `cursor` query parameter in your next request. Null when there are no more pages."

    MessageResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/MessageData"

    LoginSessionApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LoginSessionResponse"

    AuthSessionApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AuthSessionResponse"

    UserApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UserResponse"

    PasswordResetRequestApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PasswordResetRequestResponse"

    UploadUrlsApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreateUploadUrlsResponse"

    DownloadUrlsApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreateDownloadUrlsResponse"

    CoinApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CoinDetailResponse"

    CoinListApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CoinListResponse"

    CoinSetApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CoinSetResponse"

    CoinSetListApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/CoinSetResponse"

    CoinImagesApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CoinImagesResponse"

    CoinEnrichmentApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CoinEnrichmentResponse"

    SoldListingResponse:
      type: object
      required: [ title, soldPrice, currency, soldAt, listingUrl ]
      properties:
        title:
          type: string
        soldPrice:
          type: number
          format: double
        currency:
          type: string
          example: "USD"
        soldAt:
          type: string
          format: date-time
        condition:
          type: string
          nullable: true
          example: "Very Good (VG)"
        listingUrl:
          type: string
          format: uri
        imageUrl:
          type: string
          format: uri
          nullable: true

    PriceRangeResponse:
      type: object
      required: [ low, high, median, mean, sampleSize ]
      properties:
        low:
          type: number
          format: double
        high:
          type: number
          format: double
        median:
          type: number
          format: double
        mean:
          type: number
          format: double
        sampleSize:
          type: integer
          format: int32
          description: "Number of sold listings used to compute this range."

    CoinPricingResponse:
      type: object
      required: [ query, recentSales, source, fetchedAt ]
      properties:
        query:
          type: string
          description: "The search query sent to eBay."
          example: "KM# 110 United States 1921 1 Dollar Morgan Dollar VF-30"
        recentSales:
          type: array
          items:
            $ref: "#/components/schemas/SoldListingResponse"
        priceRange:
          nullable: true
          description: "Null when no sold listings were found."
          allOf:
            - $ref: "#/components/schemas/PriceRangeResponse"
        source:
          type: string
          example: "eBay"
        fetchedAt:
          type: string
          format: date-time

    CoinPricingApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CoinPricingResponse"

    NewsArticleApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/NewsArticleResponse"

    NewsListApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/NewsListResponse"

    MarketplaceListingsApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/MarketplaceListingsResponse"

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
