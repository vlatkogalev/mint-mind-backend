openapi: "3.0.3"
info:
  title: "Mint Mind Documentation"
  version: "1.0.0"
tags:
  - name: "Health"
  - name: "Auth"
  - name: "Storage"
  - name: "Webhooks"
  - name: "Coins"
  - name: "Collection"
  - name: "News"
paths:
  /health:
    get:
      tags: [ "Health" ]
      summary: "Service health check"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/register:
    post:
      tags: [ "Auth" ]
      summary: "Register a new user"
      description: "Creates a user, profile, free active subscription, and stores an email verification token. Secret auth fields are never returned."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: [ "Auth" ]
      summary: "Authenticate a user and issue tokens"
      description: "Requires a verified email address. Returns a short-lived JWT access token and a long-lived refresh token."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSessionApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: [ "Auth" ]
      summary: "Refresh an access token"
      description: "Validates the refresh token against the stored refresh token hash and rotates it."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSessionApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    get:
      tags: [ "Auth" ]
      summary: "Verify an email address"
      parameters:
        - name: "token"
          in: "query"
          required: true
          schema:
            type: string
          description: "Email verification token sent during registration."
      responses:
        "200":
          description: "Verified — returns an HTML success page"
          content:
            text/html:
              schema:
                type: string
        "400":
          description: "Invalid or already-used token — returns an HTML error page"
          content:
            text/html:
              schema:
                type: string

  /auth/resend-verification:
    post:
      tags: [ "Auth" ]
      summary: "Resend email verification link"
      description: "Always returns a generic success message to avoid account enumeration."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: "Too many requests — cooldown period has not elapsed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password-reset/request:
    post:
      tags: [ "Auth" ]
      summary: "Request a password reset"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPasswordResetRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetRequestApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password-reset/confirm:
    post:
      tags: [ "Auth" ]
      summary: "Confirm password reset with token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPasswordResetRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [ "Auth" ]
      summary: "Get the authenticated user's profile"
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [ "Auth" ]
      summary: "Update the authenticated user's profile"
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [ "Auth" ]
      summary: "Delete the authenticated user's account"
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/upload-urls:
    post:
      tags: [ "Storage" ]
      summary: "Create presigned S3 upload URLs"
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadUrlsRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlsApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/download-urls:
    post:
      tags: [ "Storage" ]
      summary: "Create presigned S3 download URLs"
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDownloadUrlsRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadUrlsApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Forbidden"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins:
    post:
      tags: [ "Coins" ]
      summary: "Save a recognized coin"
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCoinRequest"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags: [ "Coins" ]
      summary: "List coins in the authenticated user's collection"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "country"
          in: "query"
          required: false
          schema:
            type: string
        - name: "year"
          in: "query"
          required: false
          schema:
            type: integer
            format: int32
        - name: "minValue"
          in: "query"
          required: false
          schema:
            type: number
            format: double
        - name: "maxValue"
          in: "query"
          required: false
          schema:
            type: number
            format: double
        - name: "limit"
          in: "query"
          required: false
          schema:
            type: integer
            format: int32
            default: 20
        - name: "offset"
          in: "query"
          required: false
          schema:
            type: integer
            format: int32
            default: 0
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinListApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/{id}:
    get:
      tags: [ "Coins" ]
      summary: "Get a coin by id"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [ "Coins" ]
      summary: "Delete a coin"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/{id}/notes:
    patch:
      tags: [ "Coins" ]
      summary: "Update notes for a coin"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCoinNotesRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/{id}/images:
    get:
      tags: [ "Coins" ]
      summary: "Create presigned download URLs for a coin's images"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinImagesApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /collection/stats:
    get:
      tags: [ "Collection" ]
      summary: "Get collection statistics"
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionStatsApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /news:
    get:
      tags: [ "News" ]
      summary: "List latest news articles"
      parameters:
        - name: "limit"
          in: "query"
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
        - name: "offset"
          in: "query"
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListApiResponse"

  /news/{id}:
    get:
      tags: [ "News" ]
      summary: "Get a single news article by id"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsArticleApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/revenuecat:
    post:
      tags: [ "Webhooks" ]
      summary: "Handle RevenueCat subscription webhooks"
      description: "Updates mirrored subscription state from RevenueCat events. Requires Authorization: Bearer <REVENUECAT_WEBHOOK_SECRET>."
      security:
        - revenueCatWebhookAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevenueCatWebhookRequest"
      responses:
        "200":
          description: "Processed or ignored"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    revenueCatWebhookAuth:
      type: http
      scheme: bearer
      description: "RevenueCat webhook secret configured with REVENUECAT_WEBHOOK_SECRET."

  schemas:
    ApiResponseBase:
      type: object
      required: [ success, timestampMillis ]
      properties:
        success:
          type: boolean
        error:
          type: string
          nullable: true
        timestampMillis:
          type: integer
          format: int64

    HealthData:
      type: object
      required: [ status ]
      properties:
        status:
          type: string
          example: "ok"

    AuthHealthData:
      type: object
      required: [ auth ]
      properties:
        auth:
          type: string
          example: "ready"

    MessageData:
      type: object
      required: [ message ]
      properties:
        message:
          type: string

    RegisterRequest:
      type: object
      required: [ email, password, firstName, lastName ]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          minLength: 8
          description: |
            Must be at least 8 characters and contain at least one uppercase letter,
            one lowercase letter, one digit, and one special character.
        firstName:
          type: string
          maxLength: 50
          example: "Ada"
        lastName:
          type: string
          maxLength: 50
          example: "Lovelace"

    LoginRequest:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password

    RefreshTokenRequest:
      type: object
      required: [ refreshToken ]
      properties:
        refreshToken:
          type: string

    RequestPasswordResetRequest:
      type: object
      required: [ email ]
      properties:
        email:
          type: string
          format: email

    ResendVerificationRequest:
      type: object
      required: [ email ]
      properties:
        email:
          type: string
          format: email

    ConfirmPasswordResetRequest:
      type: object
      required: [ token, newPassword ]
      properties:
        token:
          type: string
        newPassword:
          type: string
          format: password
          minLength: 8
          description: |
            Must be at least 8 characters and contain at least one uppercase letter,
            one lowercase letter, one digit, and one special character.

    UpdateProfileRequest:
      type: object
      required: [ firstName, lastName ]
      properties:
        firstName:
          type: string
          maxLength: 50
          example: "Ada"
        lastName:
          type: string
          maxLength: 50
          example: "Lovelace"

    LoginSessionResponse:
      type: object
      required: [ accessToken, refreshToken, accessTokenExpiresInSeconds, refreshTokenExpiresInSeconds ]
      properties:
        accessToken:
          type: string
          description: "JWT access token. Default TTL is 900 seconds."
        refreshToken:
          type: string
          description: "Long-lived refresh token. Store securely on the client."
        accessTokenExpiresInSeconds:
          type: integer
          format: int64
          example: 900
        refreshTokenExpiresInSeconds:
          type: integer
          format: int64
          example: 2592000

    UserResponse:
      type: object
      required: [ id, email, firstName, lastName, emailVerified ]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        emailVerified:
          type: boolean

    PasswordResetRequestResponse:
      type: object
      required: [ message ]
      properties:
        message:
          type: string

    RevenueCatWebhookRequest:
      type: object
      required: [ event ]
      properties:
        event:
          $ref: "#/components/schemas/RevenueCatWebhookEvent"

    RevenueCatWebhookEvent:
      type: object
      required: [ type ]
      properties:
        type:
          type: string
          enum: [ INITIAL_PURCHASE, RENEWAL, CANCELLATION, EXPIRATION, UNCANCELLATION ]
        app_user_id:
          type: string
          description: "RevenueCat customer ID. This should match subscriptions.rc_customer_id."
        original_app_user_id:
          type: string
          description: "Fallback RevenueCat customer ID when app_user_id is absent."
        expiration_at_ms:
          type: integer
          format: int64
          nullable: true
          description: "Subscription expiration timestamp in epoch milliseconds."
        product_id:
          type: string
          nullable: true
          description: "Used to infer plan when it contains free, pro, or enterprise."
        entitlement_id:
          type: string
          nullable: true
          description: "Used to infer plan when it contains free, pro, or enterprise."

    CreateUploadUrlsRequest:
      type: object
      required: [ fileCount ]
      properties:
        fileCount:
          type: integer
          format: int32
          minimum: 1
          maximum: 20

    PresignedUploadUrl:
      type: object
      required: [ objectKey, uploadUrl ]
      properties:
        objectKey:
          type: string
        uploadUrl:
          type: string
          format: uri

    CreateUploadUrlsResponse:
      type: object
      required: [ sessionId, uploads ]
      properties:
        sessionId:
          type: string
        uploads:
          type: array
          items:
            $ref: "#/components/schemas/PresignedUploadUrl"

    CreateDownloadUrlsRequest:
      type: object
      required: [ objectKeys ]
      properties:
        objectKeys:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: string

    PresignedDownloadUrl:
      type: object
      required: [ objectKey, downloadUrl ]
      properties:
        objectKey:
          type: string
        downloadUrl:
          type: string
          format: uri

    CreateDownloadUrlsResponse:
      type: object
      required: [ downloads ]
      properties:
        downloads:
          type: array
          items:
            $ref: "#/components/schemas/PresignedDownloadUrl"

    Confidence:
      type: string
      enum: [ HIGH, MEDIUM, LOW ]

    CatalogueNumberDto:
      type: object
      required: [ catalogueName, confidence ]
      properties:
        catalogueName:
          type: string
        number:
          type: string
          nullable: true
        confidence:
          $ref: "#/components/schemas/Confidence"

    RecognitionResultDto:
      type: object
      required: [ overallConfidence, rawJson ]
      properties:
        overallConfidence:
          $ref: "#/components/schemas/Confidence"
        countryOrIssuer:
          type: string
          nullable: true
        denomination:
          type: string
          nullable: true
        seriesName:
          type: string
          nullable: true
        year:
          type: integer
          format: int32
          nullable: true
        mintMark:
          type: string
          nullable: true
        metalComposition:
          type: string
          nullable: true
        estimatedGrade:
          type: string
          nullable: true
        estimatedGradeValue:
          type: string
          nullable: true
        rarityQualitative:
          type: string
          nullable: true
        valueLowUsd:
          type: number
          format: double
          nullable: true
        valueHighUsd:
          type: number
          format: double
          nullable: true
        obverseDescription:
          type: string
          nullable: true
        reverseDescription:
          type: string
          nullable: true
        historicalContext:
          type: string
          nullable: true
        rawJson:
          type: string

    SaveCoinRequest:
      type: object
      required: [ obverseKey, reverseKey, recognitionResult ]
      properties:
        obverseKey:
          type: string
        reverseKey:
          type: string
        recognitionResult:
          $ref: "#/components/schemas/RecognitionResultDto"
        catalogueNumbers:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueNumberDto"
        notes:
          type: string
          nullable: true

    UpdateCoinNotesRequest:
      type: object
      properties:
        notes:
          type: string
          nullable: true

    CoinResponse:
      type: object
      required: [ id, userId, obverseKey, reverseKey, recognitionResult, catalogueNumbers, createdAt ]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        obverseKey:
          type: string
        reverseKey:
          type: string
        recognitionResult:
          $ref: "#/components/schemas/RecognitionResultDto"
        catalogueNumbers:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueNumberDto"
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    CollectionStatsResponse:
      type: object
      required: [ totalCoins, estimatedTotalValueLowUsd, estimatedTotalValueHighUsd, byCountry, byYear ]
      properties:
        totalCoins:
          type: integer
          format: int32
        estimatedTotalValueLowUsd:
          type: number
          format: double
        estimatedTotalValueHighUsd:
          type: number
          format: double
        byCountry:
          type: object
          additionalProperties:
            type: integer
            format: int32
        byYear:
          type: object
          additionalProperties:
            type: integer
            format: int32

    CoinImagesResponse:
      type: object
      required: [ obverseUrl, reverseUrl ]
      properties:
        obverseUrl:
          type: string
          format: uri
        reverseUrl:
          type: string
          format: uri

    NewsArticleResponse:
      type: object
      required: [ id, title, link, description, content, publishedAt ]
      properties:
        id:
          type: string
          format: uuid
          example: "2b8950ae-0376-49c8-9231-71824a6176f6"
        title:
          type: string
          example: "CAC Coins Bring Strong Premiums in April 2026 Auctions"
        link:
          type: string
          format: uri
          description: "Canonical URL of the original article."
          example: "https://coinweek.com/cac-coins-bring-strong-premiums-in-april-2026-auctions/"
        description:
          type: string
          description: "Plain-text summary of the article, safe for list views and previews."
          example: "CAC-approved and CACG-encapsulated coins performed well in April 2026 public sales."
        content:
          type: string
          description: "Sanitized HTML body of the full article. Scripts, iframes, and inline styles have been removed."
        author:
          type: string
          nullable: true
          example: "CoinWeek"
        imageUrl:
          type: string
          format: uri
          nullable: true
          description: "URL of the first image found in the article content. Use as a thumbnail in list views."
          example: "https://coinweek.com/wp-content/uploads/2026/05/1933-Eagle-cac-1200.webp"
        publishedAt:
          type: string
          format: date-time
          description: "ISO-8601 UTC timestamp from the RSS feed's <pubDate>."
          example: "2026-05-15T15:52:12Z"

    NewsListResponse:
      type: object
      required: [ articles, total, limit, offset ]
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticleResponse"
        total:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32

