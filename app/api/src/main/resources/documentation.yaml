openapi: "3.0.3"
info:
  title: "Mint Mind Backend API"
  version: "1.0.0"
servers:
  - url: "/"
tags:
  - name: "Health"
  - name: "Auth"
  - name: "Storage"
  - name: "Webhooks"
paths:
  /health:
    get:
      tags: ["Health"]
      summary: "Service health check"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/health:
    get:
      tags: ["Auth"]
      summary: "Authentication subsystem health check"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthHealthResponse"

  /auth/register:
    post:
      tags: ["Auth"]
      summary: "Register a new user"
      description: "Creates a user, profile, free active subscription, and stores an email verification token. Secret auth fields are never returned."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: ["Auth"]
      summary: "Authenticate a user and issue tokens"
      description: "Requires a verified email address. Returns a short-lived JWT access token and a long-lived refresh token."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSessionApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: ["Auth"]
      summary: "Refresh an access token"
      description: "Validates the refresh token against the stored refresh token hash and rotates it."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSessionApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    get:
      tags: ["Auth"]
      summary: "Verify an email address"
      parameters:
        - name: "token"
          in: "query"
          required: true
          schema:
            type: string
          description: "Email verification token sent during registration."
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password-reset/request:
    post:
      tags: ["Auth"]
      summary: "Request a password reset"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPasswordResetRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetRequestApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password-reset/confirm:
    post:
      tags: ["Auth"]
      summary: "Confirm password reset with token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPasswordResetRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: ["Auth"]
      summary: "Get the authenticated user's profile"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags: ["Auth"]
      summary: "Logout the authenticated user"
      description: "Clears the stored refresh token hash for the authenticated user."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/account:
    delete:
      tags: ["Auth"]
      summary: "Delete the authenticated user's account"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/upload-urls:
    post:
      tags: ["Storage"]
      summary: "Create presigned S3 upload URLs"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadUrlsRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlsApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/download-urls:
    post:
      tags: ["Storage"]
      summary: "Create presigned S3 download URLs"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDownloadUrlsRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadUrlsApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Forbidden"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/revenuecat:
    post:
      tags: ["Webhooks"]
      summary: "Handle RevenueCat subscription webhooks"
      description: "Updates mirrored subscription state from RevenueCat events. Requires Authorization: Bearer <REVENUECAT_WEBHOOK_SECRET>."
      security:
        - revenueCatWebhookAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevenueCatWebhookRequest"
      responses:
        "200":
          description: "Processed or ignored"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    revenueCatWebhookAuth:
      type: http
      scheme: bearer
      description: "RevenueCat webhook secret configured with REVENUECAT_WEBHOOK_SECRET."

  schemas:
    ApiResponseBase:
      type: object
      required: [success, timestampMillis]
      properties:
        success:
          type: boolean
        error:
          type: string
          nullable: true
        timestampMillis:
          type: integer
          format: int64

    HealthData:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: "ok"

    AuthHealthData:
      type: object
      required: [auth]
      properties:
        auth:
          type: string
          example: "ready"

    MessageData:
      type: object
      required: [message]
      properties:
        message:
          type: string

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          minLength: 8
        firstName:
          type: string
          example: "Ada"
        lastName:
          type: string
          example: "Lovelace"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    RequestPasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ConfirmPasswordResetRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          format: password
          minLength: 8

    DeleteAccountRequest:
      type: object
      required: [confirm]
      properties:
        confirm:
          type: boolean

    LoginSessionResponse:
      type: object
      required: [accessToken, refreshToken, accessTokenExpiresInSeconds, refreshTokenExpiresInSeconds]
      properties:
        accessToken:
          type: string
          description: "JWT access token. Default TTL is 900 seconds."
        refreshToken:
          type: string
          description: "Long-lived refresh token. Store securely on the client."
        accessTokenExpiresInSeconds:
          type: integer
          format: int64
          example: 900
        refreshTokenExpiresInSeconds:
          type: integer
          format: int64
          example: 2592000

    UserResponse:
      type: object
      required: [id, email, firstName, lastName, emailVerified]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        emailVerified:
          type: boolean

    PasswordResetRequestResponse:
      type: object
      required: [message]
      properties:
        resetToken:
          type: string
          nullable: true
          description: "Development/testing value if exposed by the implementation; clients should rely on email delivery."
        message:
          type: string

    RevenueCatWebhookRequest:
      type: object
      required: [event]
      properties:
        event:
          $ref: "#/components/schemas/RevenueCatWebhookEvent"

    RevenueCatWebhookEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [INITIAL_PURCHASE, RENEWAL, CANCELLATION, EXPIRATION, UNCANCELLATION]
        app_user_id:
          type: string
          description: "RevenueCat customer ID. This should match subscriptions.rc_customer_id."
        original_app_user_id:
          type: string
          description: "Fallback RevenueCat customer ID when app_user_id is absent."
        expiration_at_ms:
          type: integer
          format: int64
          nullable: true
          description: "Subscription expiration timestamp in epoch milliseconds."
        product_id:
          type: string
          nullable: true
          description: "Used to infer plan when it contains free, pro, or enterprise."
        entitlement_id:
          type: string
          nullable: true
          description: "Used to infer plan when it contains free, pro, or enterprise."

    CreateUploadUrlsRequest:
      type: object
      required: [fileCount]
      properties:
        fileCount:
          type: integer
          format: int32
          minimum: 1
          maximum: 20

    PresignedUploadUrl:
      type: object
      required: [objectKey, uploadUrl]
      properties:
        objectKey:
          type: string
        uploadUrl:
          type: string
          format: uri

    CreateUploadUrlsResponse:
      type: object
      required: [sessionId, uploads]
      properties:
        sessionId:
          type: string
        uploads:
          type: array
          items:
            $ref: "#/components/schemas/PresignedUploadUrl"

    CreateDownloadUrlsRequest:
      type: object
      required: [objectKeys]
      properties:
        objectKeys:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: string

    PresignedDownloadUrl:
      type: object
      required: [objectKey, downloadUrl]
      properties:
        objectKey:
          type: string
        downloadUrl:
          type: string
          format: uri

    CreateDownloadUrlsResponse:
      type: object
      required: [downloads]
      properties:
        downloads:
          type: array
          items:
            $ref: "#/components/schemas/PresignedDownloadUrl"

    HealthResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/HealthData"

    AuthHealthResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AuthHealthData"

    MessageResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/MessageData"

    LoginSessionApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LoginSessionResponse"

    UserApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UserResponse"

    PasswordResetRequestApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PasswordResetRequestResponse"

    UploadUrlsApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreateUploadUrlsResponse"

    DownloadUrlsApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CreateDownloadUrlsResponse"

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
