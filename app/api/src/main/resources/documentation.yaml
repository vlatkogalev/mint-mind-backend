openapi: "3.0.3"
info:
  title: "Mint Mind Documentation"
  version: "1.0.0"
tags:
  - name: "Auth"
  - name: "Coins"
  - name: "Coin Sets"
  - name: "News"
  - name: "Marketplace"
  - name: "Storage"
  - name: "Webhooks"
  - name: "Debug"
paths:
  /auth/register:
    post:
      tags: [ "Auth" ]
      summary: "Register a new user"
      description: >
        Creates a new registered account directly, without an anonymous session.
        Prefer /auth/upgrade-account for mobile clients where an anonymous session
        already exists. This endpoint is intended for integrations or cases where
        no anonymous session is available. Returns only a User, not an AuthSession —
        the user must verify their email and then call /auth/login to obtain tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/anonymous:
    post:
      tags: [ "Auth" ]
      summary: "Authenticate or create an anonymous user session"
      description: "Bootstraps an anonymous account using an installation ID. If the installation already exists, returns a new token pair for the same user."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnonymousAuthRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/upgrade-account:
    post:
      tags: [ "Auth" ]
      summary: "Upgrade an anonymous account"
      description: "Requires an anonymous JWT and upgrades that same user to email/password without migrating data."
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: ["Auth"]
      summary: "Authenticate a user and issue tokens"
      description: "Requires a verified email address. Returns a short-lived JWT access token and a long-lived refresh token."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSessionApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: ["Auth"]
      summary: "Refresh an access token"
      description: "Validates the refresh token against the stored refresh token hash and rotates it."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSessionApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    get:
      tags: [ "Auth" ]
      summary: "Verify an email address"
      parameters:
        - name: "token"
          in: "query"
          required: true
          schema:
            type: string
          description: "Email verification token sent during registration."
      responses:
        "200":
          description: "Verified — returns an HTML success page"
          content:
            text/html:
              schema:
                type: string
        "400":
          description: "Invalid or already-used token — returns an HTML error page"
          content:
            text/html:
              schema:
                type: string

  /auth/resend-verification:
    post:
      tags: ["Auth"]
      summary: "Resend email verification link"
      description: "Always returns a generic success message to avoid account enumeration."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: "Too many requests — cooldown period has not elapsed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password-reset/request:
    post:
      tags: ["Auth"]
      summary: "Request a password reset"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPasswordResetRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetRequestApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password-reset/confirm:
    post:
      tags: ["Auth"]
      summary: "Confirm password reset with token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPasswordResetRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags: [ "Auth" ]
      summary: "Logout and invalidate the current refresh token"
      description: "Clears the stored refresh token hash for the authenticated user. The access token remains valid until it naturally expires (TTL ~900s). Anonymous users do not need to call this endpoint."
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: ["Auth"]
      summary: "Get the authenticated user's profile"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: ["Auth"]
      summary: "Update the authenticated user's profile"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [ "Auth" ]
      summary: "Delete the authenticated user's account"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins:
    post:
      tags: [ "Coins" ]
      summary: "Save a recognized coin"
      description: "Saves a coin with its AI recognition result and catalogue numbers. Enrichment runs asynchronously — the request returns immediately with matchResult null. The coin's catalogCoinId is updated once the background enrichment completes. Use GET /coins/{id} to poll for the result or POST /coins/{id}/enrich to trigger enrichment synchronously."
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCoinRequest"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinDetailApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags: [ "Coins" ]
      summary: "List user's coins"
      description: "Returns a paginated, filterable list of the authenticated user's coins."
      security:
        - bearerAuth: [ ]
      parameters:
        - name: country
          in: query
          schema:
            type: string
          description: "Filter by country or issuer."
        - name: year
          in: query
          schema:
            type: integer
          description: "Filter by year."
        - name: minValue
          in: query
          schema:
            type: number
          description: "Minimum estimated high value."
        - name: maxValue
          in: query
          schema:
            type: number
          description: "Maximum estimated low value."
        - name: setId
          in: query
          schema:
            type: string
            format: uuid
          description: "Filter by coin set ID."
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [VALUE_HIGH_TO_LOW, VALUE_LOW_TO_HIGH, RELEASE_YEAR_OLD_TO_NEW, RELEASE_YEAR_NEW_TO_OLD, DATE_ADDED_OLD_TO_NEW, DATE_ADDED_NEW_TO_OLD]
          description: "Sort order. Default: DATE_ADDED_NEW_TO_OLD."
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: "Maximum number of coins to return."
        - name: cursor
          in: query
          schema:
            type: integer
            format: int64
          description: "Epoch milliseconds of the last item's createdAt from the previous page."
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinListApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/stats:
    get:
      tags: [ "Coins" ]
      summary: "Get collection statistics"
      description: "Returns aggregate statistics for the authenticated user's coin collection, with the same filters as list coins."
      security:
        - bearerAuth: [ ]
      parameters:
        - name: country
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
        - name: minValue
          in: query
          schema:
            type: number
        - name: maxValue
          in: query
          schema:
            type: number
        - name: setId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinCollectionStatsApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/{id}:
    get:
      tags: [ "Coins" ]
      summary: "Get a single coin"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinDetailApiResponse"
        "400":
          description: "Bad request — invalid UUID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [ "Coins" ]
      summary: "Delete a coin"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/{id}/notes:
    patch:
      tags: [ "Coins" ]
      summary: "Update coin notes"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCoinNotesRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinDetailApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/{id}/images:
    get:
      tags: [ "Coins" ]
      summary: "Get presigned download URLs for obverse and reverse images"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinImagesApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coins/{id}/enrich:
    post:
      tags: [ "Coins" ]
      summary: "Manually trigger catalog enrichment"
      description: "Runs the full enrichment pipeline for a coin, respecting the 24-hour cooldown window. Works on both matched and unmatched coins — operates from the coin's stored AI recognition result."
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Match result with confidence tier and score breakdown"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchResultApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /debug/numista-match:
    post:
      tags: [ "Debug" ]
      summary: "Debug Numista matching for a recognition result"
      description: "Runs the full enrichment pipeline (cooldown check, DB lookup, Numista API, scoring) and returns detailed MatchResult with per-candidate score breakdowns. Useful for tuning signal weights and troubleshooting matching behavior."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebugNumistaMatchRequest"
      responses:
        "200":
          description: "Match result with per-candidate score breakdowns"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchResultApiResponse"

  /debug/numista-metrics:
    get:
      tags: [ "Debug" ]
      summary: "Get enrichment matching metrics"
      description: "Returns in-memory counters: total attempts, matched/ambiguous/no-match counts, Numista API calls, cache hits, and average candidates per match."
      responses:
        "200":
          description: "Metrics snapshot"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsApiResponse"

  /coins/{id}/pricing:
    get:
      tags: [ "Coins" ]
      summary: "Get active eBay listings and price estimate for a coin"
      description: "Queries eBay in real-time using a two-pass query strategy (narrow + broad) to find matching active listings and compute a price range."
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinPricingApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: "Service unavailable — eBay API error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sets:
    post:
      tags: [ "Coin Sets" ]
      summary: "Create a coin set"
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCoinSetRequest"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSetApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags: [ "Coin Sets" ]
      summary: "List all sets for the authenticated user"
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSetListApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sets/{id}:
    get:
      tags: [ "Coin Sets" ]
      summary: "Get a set by ID"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSetApiResponse"
        "400":
          description: "Bad request — invalid UUID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [ "Coin Sets" ]
      summary: "Update a set's name and description"
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCoinSetRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSetApiResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [ "Coin Sets" ]
      summary: "Delete a set"
      description: "Deletes the set. Coins in the set are NOT deleted — their set_id is set to NULL."
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sets/{id}/coins:
    post:
      tags: [ "Coin Sets" ]
      summary: "Add coins to a set"
      description: "All coins must belong to the authenticated user. If a coin is already in another set, it moves to this set."
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifySetCoinsRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSetApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Set not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [ "Coin Sets" ]
      summary: "Remove coins from a set"
      description: "Unlinks the specified coins from the set. Coins are not deleted."
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifySetCoinsRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinSetApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Set not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /news:
    get:
      tags: [ "News" ]
      summary: "List latest news articles"
      description: "Returns paginated news articles fetched from the coin news RSS feed. Public — no authentication required."
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: integer
            format: int64
          description: "Epoch milliseconds of the last article's publishedAt from the previous page."
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListApiResponse"

  /news/{id}:
    get:
      tags: [ "News" ]
      summary: "Get a single news article by UUID"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsArticleApiResponse"
        "400":
          description: "Bad request — invalid UUID"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /marketplace/listings:
    get:
      tags: [ "Marketplace" ]
      summary: "List live eBay coin listings"
      description: "Returns paginated marketplace listings fetched periodically by the background eBay job. Public — no authentication required."
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: integer
            format: int64
          description: "Epoch milliseconds of the last listing's lastSeenAt from the previous page."
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListingsApiResponse"

  /storage/upload-urls:
    post:
      tags: ["Storage"]
      summary: "Create presigned S3 upload URLs"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadUrlsRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlsApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/download-urls:
    post:
      tags: ["Storage"]
      summary: "Create presigned S3 download URLs"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDownloadUrlsRequest"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadUrlsApiResponse"
        "400":
          description: "Bad request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Forbidden"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/revenuecat:
    post:
      tags: ["Webhooks"]
      summary: "Handle RevenueCat subscription webhooks"
      description: "Updates mirrored subscription state from RevenueCat events. Requires Authorization: Bearer <REVENUECAT_WEBHOOK_SECRET>."
      security:
        - revenueCatWebhookAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevenueCatWebhookRequest"
      responses:
        "200":
          description: "Processed or ignored"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    revenueCatWebhookAuth:
      type: http
      scheme: bearer
      description: "RevenueCat webhook secret configured with REVENUECAT_WEBHOOK_SECRET."

  schemas:
    ApiResponseBase:
      type: object
      required: [success, timestampMillis]
      properties:
        success:
          type: boolean
        error:
          type: string
          nullable: true
        timestampMillis:
          type: integer
          format: int64

    HealthData:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: "ok"

    AuthHealthData:
      type: object
      required: [auth]
      properties:
        auth:
          type: string
          example: "ready"

    MessageData:
      type: object
      required: [message]
      properties:
        message:
          type: string

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          minLength: 8
        firstName:
          type: string
          example: "Ada"
        lastName:
          type: string
          example: "Lovelace"

    AnonymousAuthRequest:
      type: object
      required: [ installationId ]
      properties:
        installationId:
          type: string
          description: "Client-generated stable installation identifier."

    SignupRequest:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        firstName:
          type: string
          nullable: true
          maxLength: 50
          description: "Optional. If provided, lastName must also be provided."
        lastName:
          type: string
          nullable: true
          maxLength: 50
          description: "Optional. If provided, firstName must also be provided."

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
        installationId:
          type: string
          nullable: true

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    RequestPasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResendVerificationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ConfirmPasswordResetRequest:
      type: object
      required: [ token, newPassword ]
      properties:
        token:
          type: string
        newPassword:
          type: string
          format: password
          minLength: 8
          description: |
            Must be at least 8 characters and contain at least one uppercase letter,
            one lowercase letter, one digit, and one special character.

    UpdateProfileRequest:
      type: object
      required: [ firstName, lastName ]
      properties:
        firstName:
          type: string
          maxLength: 50
          example: "Ada"
        lastName:
          type: string
          maxLength: 50
          example: "Lovelace"

    DeleteAccountRequest:
      type: object
      required: [confirm]
      properties:
        confirm:
          type: boolean

    SaveCoinRequest:
      type: object
      required: [ obverseKey, reverseKey, coinData, aiAnalysis, catalogueNumbers ]
      properties:
        obverseKey:
          type: string
          description: "S3 object key for the obverse image."
        reverseKey:
          type: string
          description: "S3 object key for the reverse image."
        coinData:
          $ref: "#/components/schemas/CoinDataDto"
        aiAnalysis:
          $ref: "#/components/schemas/AiAnalysisDto"
        catalogueNumbers:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueNumberDto"
        notes:
          type: string
          nullable: true

    CoinDataDto:
      type: object
      description: "Coin identity and specifications. Populated from CatalogCoin (Numista) when enriched, falling back to AI recognition data."
      properties:
        countryOrIssuer:
          type: string
          nullable: true
        denomination:
          type: string
          nullable: true
        seriesName:
          type: string
          nullable: true
          description: "Always from AI recognition (no CatalogCoin source)."
        year:
          type: integer
          format: int32
          nullable: true
        era:
          type: string
          nullable: true
          description: "Always from AI recognition (no CatalogCoin source)."
        mintMark:
          type: string
          nullable: true
        metalComposition:
          type: string
          nullable: true
        weightGrams:
          type: number
          format: double
          nullable: true
        diameterMm:
          type: number
          format: double
          nullable: true
        thicknessMm:
          type: number
          format: double
          nullable: true
        edge:
          type: string
          nullable: true
        obverseDescription:
          type: string
          nullable: true
        reverseDescription:
          type: string
          nullable: true
        historicalContext:
          type: string
          nullable: true
        obverseLettering:
          type: string
          nullable: true
        reverseLettering:
          type: string
          nullable: true
        designerObverse:
          type: string
          nullable: true
        designerReverse:
          type: string
          nullable: true
        mintage:
          type: integer
          format: int64
          nullable: true
          description: "Always from AI recognition (no CatalogCoin source)."
        shape:
          type: string
          nullable: true
          description: "CatalogCoin-only. Null when not enriched."
        technique:
          type: string
          nullable: true
          description: "CatalogCoin-only. Null when not enriched."
        orientation:
          type: string
          nullable: true
          description: "CatalogCoin-only. Null when not enriched."
        mintName:
          type: string
          nullable: true
          description: "CatalogCoin-only. Null when not enriched."
        ruler:
          type: string
          nullable: true
          description: "CatalogCoin-only. Null when not enriched."
        objectType:
          type: string
          nullable: true
          description: "CatalogCoin-only. Null when not enriched."
        demonetized:
          type: boolean
          nullable: true
          description: "CatalogCoin-only. Null when not enriched."
        tags:
          type: array
          items:
            type: string
          description: "CatalogCoin-only. Empty when not enriched."
        numistaUrl:
          type: string
          nullable: true
          description: "CatalogCoin-only. Null when not enriched."
        thumbnailUrl:
          type: string
          nullable: true
          description: "CatalogCoin-only. Null when not enriched."
        minYear:
          type: integer
          format: int32
          nullable: true
          description: "CatalogCoin-only. Null when not enriched."
        maxYear:
          type: integer
          format: int32
          nullable: true
          description: "CatalogCoin-only. Null when not enriched."

    AiAnalysisDto:
      type: object
      description: "AI assessment of the coin. Always sourced from the original AI recognition result — never overridden by catalog enrichment."
      required: [ overallConfidence, rawJson ]
      properties:
        overallConfidence:
          type: string
          enum: [ HIGH, MEDIUM, LOW ]
        confidenceCountry:
          type: string
          nullable: true
        confidenceDenomination:
          type: string
          nullable: true
        confidenceSeries:
          type: string
          nullable: true
        confidenceYear:
          type: string
          nullable: true
        confidenceEra:
          type: string
          nullable: true
        mintMarkStatus:
          type: string
          nullable: true
        mintMarkConfidence:
          type: string
          nullable: true
        estimatedGrade:
          type: string
          nullable: true
        estimatedGradeValue:
          type: string
          nullable: true
        gradeCode:
          type: string
          nullable: true
        gradeConfidence:
          type: string
          nullable: true
        rarityQualitative:
          type: string
          nullable: true
        rarityScore:
          type: number
          format: double
          nullable: true
        valueLow:
          type: number
          format: double
          nullable: true
        valueHigh:
          type: number
          format: double
          nullable: true
        valueCurrency:
          type: string
          nullable: true
        positiveFeatures:
          type: array
          items:
            type: string
        negativeFeatures:
          type: array
          items:
            type: string
        supplySummary:
          type: string
          nullable: true
        demandSummary:
          type: string
          nullable: true
        valueDisclaimer:
          type: string
          nullable: true
        analysisNotes:
          type: string
          nullable: true
        obverseVisible:
          type: boolean
          nullable: true
        reverseVisible:
          type: boolean
          nullable: true
        imageFocus:
          type: string
          nullable: true
        imageLighting:
          type: string
          nullable: true
        imageResolution:
          type: string
          nullable: true
        imageCropping:
          type: string
          nullable: true
        imageIssues:
          type: array
          items:
            type: string
        rawJson:
          type: string
          description: "The original JSON string from the AI recognition response."

    CatalogueNumberDto:
      type: object
      required: [ catalogueName, confidence ]
      properties:
        catalogueName:
          type: string
          example: "Krause"
        number:
          type: string
          nullable: true
          example: "KM# 110"
        confidence:
          type: string
          enum: [ HIGH, MEDIUM, LOW ]

    UpdateCoinNotesRequest:
      type: object
      properties:
        notes:
          type: string
          nullable: true

    CoinDetailResponse:
      type: object
      required: [ id, userId, obverseUrl, reverseUrl, coinData, aiAnalysis, catalogueNumbers, createdAt ]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        obverseUrl:
          type: string
          format: uri
        reverseUrl:
          type: string
          format: uri
        coinData:
          $ref: "#/components/schemas/CoinDataDto"
        aiAnalysis:
          $ref: "#/components/schemas/AiAnalysisDto"
        catalogueNumbers:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueNumberDto"
        setId:
          type: string
          format: uuid
          nullable: true
        catalogCoinId:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: integer
          format: int64
          description: "Epoch milliseconds."

    CoinSummaryResponse:
      type: object
      required: [ id, obverseUrl, reverseUrl, createdAt ]
      properties:
        id:
          type: string
          format: uuid
        obverseUrl:
          type: string
          format: uri
        reverseUrl:
          type: string
          format: uri
        denomination:
          type: string
          nullable: true
        countryOrIssuer:
          type: string
          nullable: true
        year:
          type: integer
          format: int32
          nullable: true
        mintage:
          type: integer
          format: int64
          nullable: true
        estimatedGrade:
          type: string
          nullable: true
        estimatedGradeValue:
          type: string
          nullable: true
        estimatedValueMean:
          type: number
          format: double
          nullable: true
          description: "Mean of valueLow and valueHigh."
        setId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: integer
          format: int64
          description: "Epoch milliseconds."

    CoinListResponse:
      type: object
      required: [ coins ]
      properties:
        coins:
          type: array
          items:
            $ref: "#/components/schemas/CoinSummaryResponse"
        nextCursor:
          type: integer
          format: int64
          nullable: true
          description: "Epoch milliseconds of the last item's createdAt. Null if no more pages."

    CoinImagesResponse:
      type: object
      required: [ obverseUrl, reverseUrl ]
      properties:
        obverseUrl:
          type: string
          format: uri
        reverseUrl:
          type: string
          format: uri

    CoinCollectionStatsResponse:
      type: object
      required: [ totalCoins, totalIssuers, estimatedTotalValueMean, highlights ]
      properties:
        totalCoins:
          type: integer
          format: int32
        totalIssuers:
          type: integer
          format: int32
        estimatedTotalValueMean:
          type: number
          format: double
        highlights:
          $ref: "#/components/schemas/CollectionHighlightsResponse"

    CollectionHighlightsResponse:
      type: object
      properties:
        mostValuable:
          allOf:
            - $ref: "#/components/schemas/CoinDetailResponse"
          nullable: true
        mostAncient:
          allOf:
            - $ref: "#/components/schemas/CoinDetailResponse"
          nullable: true
        rarest:
          allOf:
            - $ref: "#/components/schemas/CoinDetailResponse"
          nullable: true

    CreateCoinSetRequest:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true

    UpdateCoinSetRequest:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true

    ModifySetCoinsRequest:
      type: object
      required: [ coinIds ]
      properties:
        coinIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid

    CoinSetResponse:
      type: object
      required: [ id, name, coinCount, previewObverseUrls, createdAt ]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        previewObverseUrls:
          type: array
          items:
            type: string
            format: uri
          description: "Up to 5 most-recently added coin obverse CDN URLs for UI thumbnails."
        coinCount:
          type: integer
          format: int32
        createdAt:
          type: integer
          format: int64
          description: "Epoch milliseconds."

    NewsArticleSummaryResponse:
      type: object
      required: [ id, title, description, publishedAt ]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          format: uri
          nullable: true
        publishedAt:
          type: integer
          format: int64
          description: "Epoch milliseconds."

    NewsArticleResponse:
      type: object
      required: [ id, title, link, description, content, publishedAt ]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        link:
          type: string
          format: uri
        description:
          type: string
        content:
          type: string
          description: "Sanitized HTML of the full article body."
        author:
          type: string
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
        publishedAt:
          type: integer
          format: int64
          description: "Epoch milliseconds."

    NewsListResponse:
      type: object
      required: [ articles ]
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticleSummaryResponse"
        nextCursor:
          type: integer
          format: int64
          nullable: true

    MarketplaceListingResponse:
      type: object
      required: [ id, ebayItemId, title, price, currency, listingUrl, buyingOptions, timestamp ]
      properties:
        id:
          type: string
          format: uuid
        ebayItemId:
          type: string
        title:
          type: string
        price:
          type: string
        currency:
          type: string
        condition:
          type: string
          nullable: true
        listingUrl:
          type: string
          format: uri
        imageUrl:
          type: string
          format: uri
          nullable: true
        buyingOptions:
          type: array
          items:
            type: string
        expiresAt:
          type: integer
          format: int64
          nullable: true
          description: "Auction end time, epoch milliseconds."
        timestamp:
          type: integer
          format: int64
          description: "Epoch milliseconds of lastSeenAt."

    MarketplaceListingsResponse:
      type: object
      required: [ listings ]
      properties:
        listings:
          type: array
          items:
            $ref: "#/components/schemas/MarketplaceListingResponse"
        nextCursor:
          type: integer
          format: int64
          nullable: true

    ActiveListingResponse:
      type: object
      required: [ title, currentPrice, currency, listingUrl, buyingOptions ]
      properties:
        title:
          type: string
        currentPrice:
          type: number
          format: double
        currency:
          type: string
        condition:
          type: string
          nullable: true
        listingUrl:
          type: string
          format: uri
        imageUrl:
          type: string
          format: uri
          nullable: true
        listingEndDate:
          type: integer
          format: int64
          nullable: true
          description: "Epoch milliseconds."
        buyingOptions:
          type: array
          items:
            type: string

    PriceRangeResponse:
      type: object
      required: [ low, high, median, mean, sampleSize ]
      properties:
        low:
          type: number
          format: double
        high:
          type: number
          format: double
        median:
          type: number
          format: double
        mean:
          type: number
          format: double
        sampleSize:
          type: integer
          format: int32

    CoinPricingResponse:
      type: object
      required: [ query, listings, source, fetchedAt ]
      properties:
        query:
          type: string
          description: "The actual search string sent to eBay."
        listings:
          type: array
          items:
            $ref: "#/components/schemas/ActiveListingResponse"
        priceRange:
          allOf:
            - $ref: "#/components/schemas/PriceRangeResponse"
          nullable: true
        source:
          type: string
          example: "eBay"
        fetchedAt:
          type: integer
          format: int64
          description: "Epoch milliseconds."

    MatchResultDto:
      type: object
      required: [ tier, retrievalKey ]
      properties:
        tier:
          type: string
          enum: [ MATCHED, AMBIGUOUS, NO_MATCH ]
          description: "Confidence tier from the scoring engine. MATCHED: score ≥ 380, all identity signals confirmed, clear top candidate. Catalog data is authoritative. AMBIGUOUS: score 300–379, or top two candidates within 50 points, or not all identity signals confirmed. Catalog data is linked but should be presented as approximate. NO_MATCH: score < 300 or no candidates found. No catalog data linked."
        bestCandidate:
          allOf:
            - $ref: "#/components/schemas/MatchCandidateDto"
          nullable: true
          description: "Highest-scoring candidate. Null when tier is NO_MATCH or no candidates scored above 0."
        allCandidates:
          type: array
          items:
            $ref: "#/components/schemas/MatchCandidateDto"
          description: "All candidates that scored above 0, sorted by score descending."
        retrievalKey:
          type: string
          description: "Normalized retrieval key used for cache lookup (e.g., 'greece|20 euro cent|2023')."

    MatchCandidateDto:
      type: object
      required: [ providerName, score, scoreBreakdown ]
      properties:
        catalogCoinId:
          type: string
          format: uuid
          nullable: true
          description: "UUID of the linked CatalogCoin. Non-null when the candidate matches an existing catalog entry."
        providerName:
          type: string
          example: "Numista"
          description: "Name of the catalog provider that sourced this candidate."
        externalId:
          type: string
          nullable: true
          description: "Provider-specific type ID (e.g., Numista type ID '6350')."
        score:
          type: integer
          description: "Total match score (max 420 with current 6 signals)."
        scoreBreakdown:
          type: object
          additionalProperties:
            type: integer
          description: "Per-signal scores. Keys: country (max 100), denomination (max 100), year (max 100), weight (max 40), diameter (max 40), composition (max 40)."

    DebugNumistaMatchRequest:
      type: object
      required: [ coinData, aiAnalysis ]
      properties:
        coinData:
          $ref: "#/components/schemas/CoinDataDto"
        aiAnalysis:
          $ref: "#/components/schemas/AiAnalysisDto"

    MetricsResponse:
      type: object
      required: [ attemptsTotal, matchedTotal, ambiguousTotal, noMatchTotal, numistaCallsTotal, cacheHitsTotal, avgCandidatesPerMatch ]
      properties:
        attemptsTotal:
          type: integer
          format: int64
          description: "Total number of getOrMatch invocations since server start."
        matchedTotal:
          type: integer
          format: int64
          description: "Number of MATCHED results."
        ambiguousTotal:
          type: integer
          format: int64
          description: "Number of AMBIGUOUS results."
        noMatchTotal:
          type: integer
          format: int64
          description: "Number of NO_MATCH results."
        numistaCallsTotal:
          type: integer
          format: int64
          description: "Number of times the Numista API was called."
        cacheHitsTotal:
          type: integer
          format: int64
          description: "Number of times cooldown was active and Numista was skipped."
        avgCandidatesPerMatch:
          type: number
          format: double
          description: "Average number of candidates considered per match attempt."

    LoginSessionResponse:
      type: object
      required: [accessToken, refreshToken, accessTokenExpiresInSeconds, refreshTokenExpiresInSeconds]
      properties:
        accessToken:
          type: string
          description: "JWT access token. Default TTL is 900 seconds."
        refreshToken:
          type: string
          description: "Long-lived refresh token. Store securely on the client."
        accessTokenExpiresInSeconds:
          type: integer
          format: int64
          example: 900
        refreshTokenExpiresInSeconds:
          type: integer
          format: int64
          example: 2592000

    AuthSessionResponse:
      type: object
      required: [ accessToken, refreshToken, accessTokenExpiresInSeconds, refreshTokenExpiresInSeconds, user ]
      properties:
        accessToken:
          type: string
          description: "JWT access token. Default TTL is 900 seconds."
        refreshToken:
          type: string
          description: "Long-lived refresh token. Store securely on the client."
        accessTokenExpiresInSeconds:
          type: integer
          format: int64
          example: 900
        refreshTokenExpiresInSeconds:
          type: integer
          format: int64
          example: 2592000
        user:
          $ref: "#/components/schemas/UserResponse"


    UserResponse:
      type: object
      required: [ id, firstName, lastName, emailVerified, isAnonymous ]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          nullable: true
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        emailVerified:
          type: boolean
        isAnonymous:
          type: boolean
        upgradedAt:
          type: integer
          format: int64
          nullable: true
          description: "Epoch milliseconds. Non-null when an anonymous user upgraded to a registered account."

    PasswordResetRequestResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    RevenueCatWebhookRequest:
      type: object
      required: [event]
      properties:
        event:
          $ref: "#/components/schemas/RevenueCatWebhookEvent"

    RevenueCatWebhookEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [INITIAL_PURCHASE, RENEWAL, CANCELLATION, EXPIRATION, UNCANCELLATION]
        app_user_id:
          type: string
          description: "RevenueCat customer ID. This should match subscriptions.rc_customer_id."
        original_app_user_id:
          type: string
          description: "Fallback RevenueCat customer ID when app_user_id is absent."
        expiration_at_ms:
          type: integer
          format: int64
          nullable: true
          description: "Subscription expiration timestamp in epoch milliseconds."
        product_id:
          type: string
          nullable: true
          description: "Used to infer plan when it contains free, pro, or enterprise."
        entitlement_id:
          type: string
          nullable: true
          description: "Used to infer plan when it contains free, pro, or enterprise."

