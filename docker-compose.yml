services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${HOSTINGER_PROJECT_NAME:-ktor_backend_template}_app:${IMAGE_TAG:-latest}
    container_name: ${HOSTINGER_PROJECT_NAME:-ktor_backend_template}_app
    ports:
      - "${APP_PORT:-80}:8080"
    environment:
      - KTOR_ENV=${KTOR_ENV:-docker}
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  db:
    image: postgres:15
    container_name: ${HOSTINGER_PROJECT_NAME:-ktor_backend_template}_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data: