services:
  app:
    image: ${APP_IMAGE}:${IMAGE_TAG:-latest}
    container_name: ${HOSTINGER_PROJECT_NAME:-ktor_backend_template}_app
    ports:
      - "${APP_PORT:-8081}:8080"
    environment:
      - KTOR_ENV=${KTOR_ENV:-docker}
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_ISSUER=${AUTH_ISSUER}
      - AUTH_AUDIENCE=${AUTH_AUDIENCE}
      - AUTH_REALM=${AUTH_REALM}
      - AUTH_ACCESS_TOKEN_TTL_SECONDS=${AUTH_ACCESS_TOKEN_TTL_SECONDS}
      - AUTH_REFRESH_TOKEN_TTL_SECONDS=${AUTH_REFRESH_TOKEN_TTL_SECONDS}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_BUCKET=${AWS_BUCKET}
      - AWS_UPLOAD_URL_TTL_SECONDS=${AWS_UPLOAD_URL_TTL_SECONDS}
      - AWS_DOWNLOAD_URL_TTL_SECONDS=${AWS_DOWNLOAD_URL_TTL_SECONDS}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - APP_BASE_URL=${APP_BASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  db:
    image: postgres:15
    container_name: ${HOSTINGER_PROJECT_NAME:-ktor_backend_template}_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
