name: Deploy to Hostinger VPS

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Compute image repository
        id: image
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY,,}-app" >> "$GITHUB_OUTPUT"

      - name: Deploy to Hostinger VPS
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID || secrets.HOSTINGER_VM_ID }}
          project-name: ${{ vars.HOSTINGER_PROJECT_NAME || secrets.HOSTINGER_PROJECT_NAME || github.event.repository.name }}
          docker-compose-path: docker-compose.yml
          environment-variables: |
            HOSTINGER_PROJECT_NAME=${{ vars.HOSTINGER_PROJECT_NAME || secrets.HOSTINGER_PROJECT_NAME || github.event.repository.name }}
            IMAGE_TAG=${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
            APP_IMAGE=${{ steps.image.outputs.repo }}
            APP_PORT=${{ vars.APP_PORT || 8081 }}
            APP_BASE_URL=${{ vars.APP_BASE_URL || secrets.APP_BASE_URL }}
            DB_URL=${{ secrets.DB_URL }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_ISSUER=${{ vars.AUTH_ISSUER || secrets.AUTH_ISSUER }}
            AUTH_AUDIENCE=${{ vars.AUTH_AUDIENCE || secrets.AUTH_AUDIENCE }}
            AUTH_REALM=${{ vars.AUTH_REALM || secrets.AUTH_REALM }}
            AUTH_ACCESS_TOKEN_TTL_SECONDS=${{ vars.AUTH_ACCESS_TOKEN_TTL_SECONDS || secrets.AUTH_ACCESS_TOKEN_TTL_SECONDS }}
            AUTH_REFRESH_TOKEN_TTL_SECONDS=${{ vars.AUTH_REFRESH_TOKEN_TTL_SECONDS || secrets.AUTH_REFRESH_TOKEN_TTL_SECONDS }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ vars.AWS_REGION || secrets.AWS_REGION }}
            AWS_BUCKET=${{ vars.AWS_BUCKET || secrets.AWS_BUCKET }}
            AWS_UPLOAD_URL_TTL_SECONDS=${{ vars.AWS_UPLOAD_URL_TTL_SECONDS || secrets.AWS_UPLOAD_URL_TTL_SECONDS }}
            AWS_DOWNLOAD_URL_TTL_SECONDS=${{ vars.AWS_DOWNLOAD_URL_TTL_SECONDS || secrets.AWS_DOWNLOAD_URL_TTL_SECONDS }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EMAIL_FROM=${{ vars.EMAIL_FROM || secrets.EMAIL_FROM }}
            EBAY_CLIENT_ID=${{ secrets.EBAY_CLIENT_ID }}
            EBAY_CLIENT_SECRET=${{ secrets.EBAY_CLIENT_SECRET }}
            EBAY_OAUTH_ENDPOINT=${{ vars.EBAY_OAUTH_ENDPOINT || 'https://api.ebay.com/identity/v1/oauth2/token' }}
            EBAY_OAUTH_SCOPE=${{ vars.EBAY_OAUTH_SCOPE || 'https://api.ebay.com/oauth/api_scope' }}
            EBAY_MARKETPLACE_ID=${{ vars.EBAY_MARKETPLACE_ID }}
            EBAY_ENVIRONMENT=${{ vars.EBAY_ENVIRONMENT }}
            EBAY_FEED_PAGES=${{ vars.EBAY_FEED_PAGES || '5' }}
            EBAY_FEED_REFRESH_INTERVAL_SECONDS=${{ vars.EBAY_FEED_REFRESH_INTERVAL_SECONDS || '600' }}
            EBAY_MAX_RESULTS=${{ vars.EBAY_MAX_RESULTS || '10' }}
            NUMISTA_API_KEY=${{ secrets.NUMISTA_API_KEY }}
            NUMISTA_BASE_URL=${{ vars.NUMISTA_BASE_URL || 'https://api.numista.com' }}
            REVENUECAT_WEBHOOK_SECRET=${{ secrets.REVENUECAT_WEBHOOK_SECRET }}
            KTOR_ENV=docker
